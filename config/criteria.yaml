# Job search rubric. Both filter stages (src/filter_claude.py) load this file
# and inline it into the Claude prompts — keep it in plain language since it
# is read by the model, not just by code.

role:
  target_titles:
    - "Staff Product Manager"
    - "Group Product Manager"
    - "Principal Product Manager"
  equivalents_note: >
    Titles that clearly signal the same seniority band (e.g. "Principal PM",
    "Group PM", "Senior Staff PM") should be treated as matches even if the
    exact words differ.
  hard_fail_titles:
    - "Associate Product Manager"
    - "APM"
    - "Product Manager I"
    - "Product Manager II"
    - "Junior Product Manager"
    - "PM Intern"
    - "Product Owner"

domain:
  description: >
    The domain test applies to the specific product/role, not necessarily
    the whole company. The role must involve either a B2B enterprise
    offering, or AI functionality (or both).
  required_any:
    - "B2B enterprise offering"
    - "AI functionality"
  examples: >
    A consumer-first company spinning up a B2B arm counts (e.g. a PM role
    on Notion's team offering, even though Notion is consumer-rooted).
    General marketing tech platforms count even without an AI angle (e.g.
    Kit, Mailchimp) as long as the product itself is B2B.

scope:
  description: >
    0-1 builds or scaling a new product line. NOT maintenance of a mature,
    already-established product with an existing steady-state roadmap.

company_stage:
  minimum: "Series B"
  hard_fail_below: "seed / pre-seed"
  note: >
    Public / late-stage / established companies count as meeting this bar.
  soft_preference: >
    Slight preference for companies with under 1000 employees. This is a
    tiebreaker, not a hard filter -- a larger company that clears every
    other criterion is still a strong match, just not quite as ideal as an
    otherwise-identical smaller one.

impact:
  description: >
    High-visibility work with serious business impact: signals like
    "millions in revenue," a new market bet, executive visibility, or a
    multi-year build/scale mandate (3-5 years, not a fast-flip role).

management_style:
  fit: "hybrid IC + management"
  description: >
    Wants to mentor at minimum, ideally manage a small team of 1-2 while
    remaining hands-on individually. Pure people-management roles with no
    IC component are a weaker fit. Pure IC-only roles with zero
    mentoring/leadership scope are also a weaker fit.

location:
  accept:
    - "NY-based hybrid, 3 or fewer days/week in office"
    - "fully remote"
  hard_fail:
    - "hybrid requiring 4+ days/week in office"
    - "on-site outside NY with no remote option"

excluded_industries:
  - fintech
  - security / compliance software

scoring:
  scale: "1-10"
  threshold_for_digest: 7
