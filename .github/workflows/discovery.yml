name: Company Discovery

on:
  schedule:
    - cron: "0 12 */3 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: discovery
  cancel-in-progress: false

jobs:
  run-discovery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Run discovery
        env:
          SCRAPER_PROXY_URL: ${{ secrets.SCRAPER_PROXY_URL }}
          SCRAPER_DELAY_SECONDS: ${{ secrets.SCRAPER_DELAY_SECONDS }}
        run: python src/run_discovery.py

      - name: Commit updated company list and ATS map
        run: |
          git config user.name "job-digest-bot"
          git config user.email "actions@github.com"
          git add config/companies_seed.yaml config/ats_map.yaml
          git diff --cached --quiet || git commit -m "chore: refresh discovered company list [skip ci]"
          git push
